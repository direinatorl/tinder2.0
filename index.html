<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tinder Clone</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome para os ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <i class="fa-solid fa-fire logo"></i>
            <h2>Tinder</h2>
        </header>

        <main class="card-container" id="card-container">
            <!-- Cards serão inseridos aqui pelo JavaScript -->
        </main>

        <footer class="app-footer">
            <button class="action-btn nope-btn" id="nope-btn">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <button class="action-btn like-btn" id="like-btn">
                <i class="fa-solid fa-heart"></i>
            </button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
